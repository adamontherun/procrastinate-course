name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Mirrors compose.yaml: same image, same credentials, same non-default
    # port (PGPORT makes Postgres listen on 5441 internally).
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: procrastinate_course
          PGPORT: "5441"
        ports:
          - "5441:5441"
        options: >-
          --health-cmd "pg_isready -U postgres -d procrastinate_course -p 5441"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type-check
        run: uv run mypy examples challenges solutions

      # A challenge suite whose tests pass against the untouched skeleton
      # isn't testing anything, so CI asserts BOTH directions.
      - name: Skeletons must still fail (they're unfinished by design)
        run: |
          if uv run pytest challenges -q; then
            echo "::error::challenges passed against the untouched skeletons — a challenge test isn't testing anything"
            exit 1
          fi

      - name: Reference solutions must pass every challenge test
        run: COURSE_SOLUTIONS=1 uv run pytest challenges -q

  devcontainer-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the devcontainer and run a real example inside it
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository }}-devcontainer
          push: never
          runCmd: |
            set -e
            uv sync
            uv run python -m examples.hello_world
            COURSE_SOLUTIONS=1 uv run pytest challenges -q
